# ================================================
# 优化奖励函数配置 - 参考LGPF论文设计
# ================================================
# 
# 论文奖励函数:
#   r_p = -Σ ||g_i - N(g_i, B)||  (模式形成)
#   r_c = -1/2 * Σ 1[||p(i)-p(j)|| ≤ 2R]  (碰撞惩罚)
#   r = r_p + α * r_c
#
# 优化设计原则:
# 1. 各项奖励数值范围相近 (约 [-1, 1])
# 2. 奖励随训练进行逐渐增大并收敛
# 3. 避免某一项压倒性主导
# ================================================

# ================================
# 归一化参数
# ================================
# 最大距离归一化因子（环境范围约 [-15, 15]）
max_distance: 30.0

# 模式形成归一化因子
formation_norm: 10.0

# ================================
# 碰撞惩罚参数
# ================================
# 碰撞惩罚强度
collision_penalty: -1.0

# 危险距离阈值（机器人半径的倍数）
danger_threshold: 2.0

# 危险区域惩罚系数
danger_decay: 1.0

# ================================
# 进度奖励参数
# ================================
# 距离改善奖励系数
progress_scale: 1.0

# 最大进度奖励
max_progress_reward: 0.5

# ================================
# 目标奖励参数
# ================================
# 到达目标奖励
goal_reward: 1.0

# ================================
# 时间惩罚
# ================================
time_penalty: -0.01

# ================================
# 权重参数
# ================================
# 各项权重，通过权重调整重要性
# 所有 r_* 项范围约为 [-1, 1]
w_formation: 1.0    # 模式形成权重
w_collision: 2.0    # 碰撞惩罚权重（最重要，避免碰撞）
w_progress: 0.5     # 进度奖励权重
w_goal: 3.0         # 目标奖励权重
w_time: 0.1         # 时间惩罚权重

# ================================
# 收敛控制参数
# ================================
# 奖励平滑因子（用于避免奖励剧烈波动）
reward_smoothing: 0.9

# 是否使用奖励缩放（根据训练进度动态调整）
use_dynamic_scaling: false
